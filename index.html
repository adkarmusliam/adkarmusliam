    <style>
        :root {
            --primary-dark: #1a2a6c;
            --accent-gold: #c9a66b;
            --text-light: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #2a4858, #1a2a6c);
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2.5rem 1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.8rem;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 2rem auto;
            width: 95%;
        }

        .container-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 25px 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:hover {
            background: var(--accent-gold);
            color: var(--primary-dark);
            transform: translateY(-3px);
        }

        .btn-full {
            grid-column: span 3;
            background: rgba(201, 166, 107, 0.15);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            margin-top: 10px;
        }

        .btn-full:hover {
            background: var(--accent-gold);
            color: white;
        }

        /* تنسيق زر الدعم العائم في الزاوية */
        .support-float {
            position: fixed;
            bottom: 25px;
            left: 25px; /* الزاوية اليسرى لأن الموقع RTL */
            background: var(--accent-gold);
            color: var(--primary-dark);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .support-float:hover {
            transform: scale(1.1) rotate(10deg);
            background: #f8f9fa;
            color: var(--primary-dark);
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr); 
                gap: 8px;
            }
            .btn {
                font-size: 0.9rem;
                padding: 15px 5px;
            }
            .support-float {
                width: 55px;
                height: 55px;
                bottom: 15px;
                left: 15px;
                font-size: 0.8rem;
            }
        }
    </style>
