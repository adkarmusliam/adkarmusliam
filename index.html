    <meta name="msvalidate.01" content="BDF71B59508617D3C7E4B3F8017FAECA" />
    <title>أذكار - حصن المسلم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;family=Tajawal:wght@300;500;700&amp;display=swap">
    
    <style>
        :root {
            --primary-dark: #1a2a6c;
            --accent-gold: #c9a66b;
            --text-light: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #2a4858, #1a2a6c);
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2.5rem 1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.8rem;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 2rem auto;
            width: 95%;
        }

        .container-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
        }

        /* تنسيق الشبكة */
        .grid-container {
            display: grid;
            /* إنشاء 3 أعمدة متساوية */
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 25px 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:hover {
            background: var(--accent-gold);
            color: var(--primary-dark);
            transform: translateY(-3px);
        }

        /* الزر الأخير: يمتد على الـ 3 أعمدة كاملة */
        .btn-full {
            grid-column: span 3;
            background: rgba(201, 166, 107, 0.15);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            margin-top: 10px;
        }

        .btn-full:hover {
            background: var(--accent-gold);
            color: white;
        }

        /* تحسين العرض على الجوال */
        @media (max-width: 600px) {
            .grid-container {
                /* في الجوال نجعلها صفين (اختياري) أو نحافظ على الـ 3 لضغط المساحة */
                grid-template-columns: repeat(3, 1fr); 
                gap: 8px;
            }
            .btn {
                font-size: 0.9rem;
                padding: 15px 5px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>أذكار</h1>
        <span>حِصْنُ الْمُسْلِمِ</span>
    </header>

    <main>
        <div class="container-box">
            <div class="grid-container">
                <!-- الصف الأول (3 أزرار) -->
                <a href="pages/اذكار_الصباح.html" class="btn">أذكار الصباح</a>
                <a href="pages/اذكار_المساء.html" class="btn">أذكار المساء</a>
                <a href="pages/اذكار_بعد_الصلاة.html" class="btn">بعد الصلاة</a>
                
                <!-- الصف الثاني (3 أزرار) -->
                <a href="pages/تسابيح.html" class="btn">تسابيح</a>
                <a href="pages/اذكار_النوم.html" class="btn">أذكار النوم</a>
                <a href="pages/اذكار_الاستيقاظ.html" class="btn">الاستيقاظ</a>
                
                <!-- الصف الثالث (زر الوضوء لحاله) -->
                <a href="pages/اذكار_الوضوء.html" class="btn btn-full">أذكار الوضوء</a>
            </div>
        </div>
    </main>
