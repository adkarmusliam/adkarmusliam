    <title>أذكار الاستيقاظ - حصن المسلم</title>
    
    <!-- الخطوط -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;700&display=swap">
    
    <style>
        :root {
            --primary-dark: #1a2a6c;
            --accent-gold: #c9a66b;
            --text-light: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --done-bg: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #2a4858, #1a2a6c);
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px 10px;
        }

        /* زر الرجوع للرئيسية */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: var(--accent-gold);
            color: var(--primary-dark);
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: #e0bb7a;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 60px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--accent-gold);
        }

        header p {
            opacity: 0.8;
            font-weight: 300;
        }

        /* حاوية الأذكار */
        #azkar-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* كرت الذكر */
        .zekr-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .zekr-card.is-done {
            opacity: 0.4;
            filter: grayscale(0.8);
            transform: scale(0.98);
        }

        .zekr-body {
            padding: 25px;
            flex-grow: 1;
        }

        .zekr-text {
            font-size: 1.4rem;
            line-height: 1.8;
            text-align: justify;
            margin-bottom: 15px;
            color: white;
        }

        .zekr-note {
            background: rgba(201, 166, 107, 0.1);
            border-right: 4px solid var(--accent-gold);
            padding: 10px 15px;
            font-size: 0.95rem;
            color: #d1d1d1;
            font-style: italic;
        }

        /* شريط العداد */
        .zekr-counter-area {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
        }

        .counter-badge {
            background: var(--accent-gold);
            color: var(--primary-dark);
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .zekr-text { font-size: 1.2rem; }
            .back-btn span { display: none; } /* إخفاء النص في الجوال ليبقى الأيقونة */
        }
    </style>

<body>

    <a href="https://adkarmusliam.github.io/" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">

        </svg>
        <span>الرئيسية</span>
    </a>

    <header>
        <h1>أذكار الاستيقاظ</h1>
        <p>حصن المسلم</p>
    </header>

    <main id="azkar-container">
        <!-- يتم توليد الأذكار هنا بواسطة JavaScript -->
    </main>
    <script>
        const azkarData = [
            {
                text: "الحَمْـدُ لِلّهِ الّذي أَحْـيانا بَعْـدَ ما أَماتَـنا وَإليه النُّـشور. ",
                note: "",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "لحمدُ للهِ الذي عافاني في جَسَدي وَرَدّ عَليّ روحي وَأَذِنَ لي بِذِكْرِه",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "لا إلهَ إلاّ اللّهُ وَحْـدَهُ لا شَـريكَ له، لهُ المُلـكُ ولهُ الحَمـد، وهوَ على كلّ شيءٍ قدير، سُـبْحانَ اللهِ، والحمْـدُ لله ، ولا إلهَ إلاّ اللهُ واللهُ أكبَر، وَلا حَولَ وَلا قوّة إلاّ باللّهِ العليّ العظيم. رَبِّ اغْفرْ لي.",
                maxCount: 1,
                currentCount: 1
            }
        ];

        function renderAzkar() {
            const container = document.getElementById('azkar-container');
            container.innerHTML = '';
            
            azkarData.forEach((zekr, index) => {
                const isDone = zekr.currentCount === 0;
                
                const card = document.createElement('div');
                card.className = `zekr-card ${isDone ? 'is-done' : ''}`;
                card.onclick = () => decrement(index);

                card.innerHTML = `
                    <div class="zekr-body">
                        <p class="zekr-text">${zekr.text}</p>
                        ${zekr.note ? `<div class="zekr-note">${zekr.note}</div>` : ''}
                    </div>
                    <div class="zekr-counter-area">
                        <button onclick="reset(${index}, event)" class="reset-btn">إعادة</button>
                        <div class="counter-badge">
                            ${zekr.currentCount}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function decrement(index) {
            if (azkarData[index].currentCount > 0) {
                azkarData[index].currentCount--;
                renderAzkar();
                // اهتزاز خفيف للموبايل عند النقر
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }

        function reset(index, event) {
            event.stopPropagation();
            azkarData[index].currentCount = azkarData[index].maxCount;
            renderAzkar();
        }

        renderAzkar();
    </script>
</body>
