<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>دعم الصفحة</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;700&display=swap">
    
    <style>
        :root {
            --primary-dark: #1a2a6c;
            --accent-gold: #c9a66b;
            --text-light: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #2a4858, #1a2a6c);
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* الرابط الذي يغطي كامل الشاشة */
        .full-screen-link {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 90%;
            width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1.5s ease-in-out;
            pointer-events: none; /* لجعل الضغط يمر من خلال المربع للرابط الخلفي */
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .highlight {
            display: block;
            margin-top: 10px;
            font-weight: 700;
            color: var(--accent-gold);
            border: 2px dashed var(--accent-gold);
            padding: 10px;
            border-radius: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* لمسة جمالية في الخلفية */
        .bg-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-gold);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-circle"></div>

    <a href="" class="full-screen-link">
        <div class="container-box">
            <h1>دعم المحتوى</h1>
            <p>
                لضمان استمرار الصفحة في تقديم خدماتها
                <span class="highlight">اضغط في أي مكان لدعمنا</span>
            </p>
        </div>
    </a>

</body>
</html>
